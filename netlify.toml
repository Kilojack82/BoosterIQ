[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# Bump the synchronous function timeout to the platform max so long-running
# Anthropic API calls (Square items PDF parse, receipt parse) don't 504.
# Free tier ceiling is 26s; Pro is 30s. Netlify clamps if the value exceeds
# the plan limit.
[functions]
  included_files = []

[functions."api/*"]
  timeout = 30

# Netlify auto-detects Next.js and installs @netlify/plugin-nextjs.
